<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="#" class="logo">
    <div class="logo-circle">🌸</div>
    <div class="logo-text">
      <div class="logo-name">Flower</div>
    </div>
  </a>

  <button class="menu-toggle" id="mobile-menu">&#9776;</button>

  <ul class="nav-links" id="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="about.html">About</a></li>
  <li><a href="contact.html">Contact</a></li>
  <li id="login-link"><a href="login.html">Login</a></li>
  <li id="signup-link"><a href="signup.html">Sign Up</a></li>
  <li id="orders-link" style="display:none;"><a href="orders.html">Orders</a></li>
</ul>
</nav>

<div class="menu-overlay" id="menu-overlay"></div>

<!-- LOGIN FORM -->
<div class="signup-container">
  <h2>Welcome Back </h2>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

  <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<!-- JS -->
<script>
  const form = document.getElementById("login-form");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      alert("Email or password is incorrect!");
      return;
    }

    // حفظ المستخدم الحالي
    localStorage.setItem("currentUser", JSON.stringify(user));

    alert("Login successful ");

    window.location.href = "index.html";
  });

  // NAV MENU
  const menuToggle = document.getElementById('mobile-menu');
  const navLinks = document.getElementById('nav-links');
  const closeMenuBtn = document.getElementById('close-menu');
  const overlay = document.getElementById('menu-overlay');

  menuToggle.onclick = () => {
    navLinks.classList.add('active');
    overlay.classList.add('active');
  };

  closeMenuBtn.onclick = () => {
    navLinks.classList.remove('active');
    overlay.classList.remove('active');
  };

  overlay.onclick = () => {
    navLinks.classList.remove('active');
    overlay.classList.remove('active');
  };
  function updateNavbar() {
  const loginLink = document.getElementById('login-link');
  const currentUser = JSON.parse(localStorage.getItem("currentUser"));

  if (currentUser) {
    const firstName = currentUser.name.split(' ')[0];
    loginLink.innerHTML = `<span>مرحباً، ${firstName}</span> | <a href="#" id="logout">Logout</a>`;
    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem("currentUser");
      updateNavbar();
    });
  } else {
    loginLink.innerHTML = `<a href="login.html">Login</a>`;
  }
}

updateNavbar();
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (currentUser) {
  // المستخدم مسجل دخول
  document.getElementById("login-link").style.display = "none";
  document.getElementById("signup-link").style.display = "none";
  document.getElementById("orders-link").style.display = "block";
} else {
  // المستخدم غير مسجل
  document.getElementById("orders-link").style.display = "none";
}
</script>

</body>
</html>
