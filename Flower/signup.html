<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- NAVBAR  -->
<nav class="navbar">
  <a href="#" class="logo">
    <div class="logo-circle">🌸</div>
    <div class="logo-text">
      <div class="logo-name">Flower</div>
    </div>
  </a>

  <button class="menu-toggle" id="mobile-menu">&#9776;</button>

  <ul class="nav-links" id="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="about.html">About</a></li>
  <li><a href="contact.html">Contact</a></li>
  <li id="login-link"><a href="login.html">Login</a></li>
  <li id="signup-link"><a href="signup.html">Sign Up</a></li>
  <li id="orders-link" style="display:none;"><a href="orders.html">Orders</a></li>
</ul>
</nav>

<div class="menu-overlay" id="menu-overlay"></div>

<!-- SIGNUP FORM -->
<div class="signup-container">
  <h2>Create Account </h2>

  <form id="signup-form">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Sign Up</button>
  </form>

  <p>Already have an account ? <a href="login.html"> Login</a></p>
</div>

<!-- JS -->
<script>
  const form = document.getElementById("signup-form");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // تحقق إذا المستخدم موجود
    const exists = users.find(user => user.email === email);

    if (exists) {
      alert("هذا الإيميل مسجل مسبقاً!");
      return;
    }

    users.push({ name, email, password });

    localStorage.setItem("users", JSON.stringify(users));

    alert("تم إنشاء الحساب بنجاح ");

    window.location.href = "login.html";
  });

  // NAV MENU
  const menuToggle = document.getElementById('mobile-menu');
  const navLinks = document.getElementById('nav-links');
  const closeMenuBtn = document.getElementById('close-menu');
  const overlay = document.getElementById('menu-overlay');

  menuToggle.onclick = () => {
    navLinks.classList.add('active');
    overlay.classList.add('active');
  };

  closeMenuBtn.onclick = () => {
    navLinks.classList.remove('active');
    overlay.classList.remove('active');
  };

  overlay.onclick = () => {
    navLinks.classList.remove('active');
    overlay.classList.remove('active');
  };
  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (currentUser) {
  // المستخدم مسجل دخول
  document.getElementById("login-link").style.display = "none";
  document.getElementById("signup-link").style.display = "none";
  document.getElementById("orders-link").style.display = "block";
} else {
  // المستخدم غير مسجل
  document.getElementById("orders-link").style.display = "none";
}
</script>

</body>
</html>
