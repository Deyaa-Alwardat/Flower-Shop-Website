<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Overlay -->
  <div class="menu-overlay" id="menu-overlay"></div>

  <header>
      <nav class="navbar">
        <!-- Logo على اليسار -->
        <a href="#" class="logo">
          <div class="logo-circle">🌸</div>
          <div class="logo-text">
            <div class="logo-name">Flower</div>
          </div>
        </a>

        <!-- Links (desktop) -->
      <!-- فوق -->
<ul class="top-links">
  <li id="login-link"><a href="login.html">Login</a></li>
  <li id="signup-link"><a href="signup.html">Sign Up</a></li>
</ul>

<!-- تحت -->
<ul class="nav-links" id="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="about.html">About</a></li>
  <li><a href="contact.html">Contact</a></li>
  <li id="orders-link"><a href="orders.html">Orders</a></li>
</ul>

    <button class="menu-toggle" id="mobile-menu" aria-label="Open menu">&#9776;</button>
  </nav>
  <!-- ================= ABOUT CONTENT ================= -->
<div class="about-header">
  <img src="images/tomoko-uji-kxvn1ogpTtE-unsplash.jpg" alt="Flowers">
</div>
  <!-- Contact Section -->
  <section class="contact-section py-5">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">Contact Us 🌸</h1>
        <p class="lead text-muted">We would love to hear from you! Fill out the form below and we'll get back to you as soon as possible.</p>
      </div>
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <form class="contact-form p-4 rounded shadow-sm" style="background: #fff8f0;">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea id="message" rows="5" class="form-control" placeholder="Write your message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks   = document.getElementById('nav-links');
    const overlay    = document.getElementById('menu-overlay');
    const closeBtn   = document.getElementById('close-menu');

    function openMenu()  { navLinks.classList.add('active');    overlay.classList.add('active');    document.body.style.overflow = 'hidden'; }
    function closeMenu() { navLinks.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; }

    menuToggle.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);
    navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', closeMenu));
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (currentUser) {
  // المستخدم مسجل دخول
  document.getElementById("login-link").style.display = "none";
  document.getElementById("signup-link").style.display = "none";
  document.getElementById("orders-link").style.display = "block";
} else {
  // المستخدم غير مسجل
  document.getElementById("orders-link").style.display = "none";
}
    
  </script>
  <!-- Navbar Dynamic Script -->
<script src="navbar.js"></script>
</body>
</html>
